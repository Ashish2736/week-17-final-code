name: Build and Deploy to Docker Hub

on:
  push:
    branches:
      - migration

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Check Out Repo
      uses: actions/checkout@v2

    - name: Log in to Docker Hub
      uses: docker/login-action@v1
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Docker image
      uses: docker/build-push-action@v2
      with:
        context: .
        file: ./docker/Dockerfile.user
        push: true
        tags: tdem2736/ashish2736:latest  # Replace with your Docker Hub username and repository

    - name: Verify Pushed Image
      run: docker pull tdem2736/ashish2736:latest  # Replace with your Docker Hub username and repository


#these steps are done by github k garcha bhane afnai machine jastai yah mention garecham ni ubuntu bhanera
#ho tei machine ma github le it clones the repo, dockerize it, push it to dockerhub. 
#suru ma dockerhub ma fresh repo banaune ani tya profile ma click garera account setting ma gayera personal access token ma gayera password line haina
#ani tyo password github ko jun repo ma ho you garna lako teskai settings ma gayera sidebar ma secrets and variables cha ni ho tesma actions click garera 
